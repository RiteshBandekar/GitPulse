<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Syne', sans-serif; background: #0a0a0f; }
    .mono { font-family: 'Space Mono', monospace; }

    /* Animated grid background */
    .grid-bg {
      background-image:
        linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Glow effects */
    .glow-indigo { box-shadow: 0 0 40px rgba(99,102,241,0.25), 0 0 80px rgba(99,102,241,0.1); }
    .glow-text { text-shadow: 0 0 40px rgba(129,140,248,0.6); }
    .input-glow:focus { box-shadow: 0 0 0 2px rgba(99,102,241,0.5), 0 0 30px rgba(99,102,241,0.2); }

    /* Search input */
    .search-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f1f5f9;
      transition: all 0.3s ease;
    }
    .search-input:focus { outline: none; border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.06); }
    .search-input::placeholder { color: rgba(255,255,255,0.25); }

    /* Search button */
    .search-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      transition: all 0.3s ease;
    }
    .search-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .search-btn:active { transform: translateY(0); }

    /* Recent search chips */
    .chip {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .chip:hover { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); color: #a5b4fc; }

    /* Error box */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
    }

    /* Loading dots */
    .dot { animation: bounce 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* Fade in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease forwards; }
    .fade-up-delay { animation: fadeUp 0.6s ease 0.2s forwards; opacity: 0; }
    .fade-up-delay2 { animation: fadeUp 0.6s ease 0.4s forwards; opacity: 0; }

    /* Orb decoration */
    .orb {
      border-radius: 50%;
      filter: blur(80px);
      position: absolute;
      pointer-events: none;
    }
  </style>
</head>
<body class="grid-bg min-h-screen flex flex-col items-center justify-center px-4 py-16 relative overflow-hidden">

  <!-- Decorative orbs -->
  <div class="orb w-96 h-96 bg-indigo-600 opacity-10 top-0 -left-32"></div>
  <div class="orb w-80 h-80 bg-violet-600 opacity-10 bottom-0 -right-24"></div>

  <!-- Main card -->
  <div class="w-full max-w-xl relative z-10">

    <!-- Logo / Title -->
    <div class="text-center mb-10 fade-up">
      <div class="inline-flex items-center gap-2 mb-4">
        <!-- GitHub icon -->
        <svg class="w-10 h-10 text-indigo-400" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        <span class="text-3xl font-extrabold text-white glow-text tracking-tight">GitExplorer</span>
      </div>
      <p class="text-slate-400 mono text-sm">// search any github profile</p>
    </div>

    <!-- Search box -->
    <div class="fade-up-delay">
      <div class="flex gap-2">
        <div class="relative flex-1">
          <span class="mono absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400 text-sm select-none">@</span>
          <input
            id="search-input"
            type="text"
            placeholder="username"
            autocomplete="off"
            class="search-input input-glow mono w-full rounded-xl py-4 pl-9 pr-4 text-base"
          />
        </div>
        <button id="search-btn" class="search-btn text-white font-bold px-6 rounded-xl mono text-sm" onclick="handleSearch()">
          Search
        </button>
      </div>

      <!-- Error message -->
      <div id="error-msg" class="error-box hidden mt-3 rounded-lg px-4 py-3 text-red-400 mono text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span id="error-text">User not found.</span>
      </div>

      <!-- Loading indicator -->
      <div id="loading" class="hidden mt-4 flex justify-center gap-2">
        <div class="dot w-2 h-2 rounded-full bg-indigo-400"></div>
        <div class="dot w-2 h-2 rounded-full bg-indigo-400"></div>
        <div class="dot w-2 h-2 rounded-full bg-indigo-400"></div>
      </div>
    </div>

    <!-- Recent searches -->
    <div id="recent-section" class="mt-8 fade-up-delay2">
      <p class="mono text-xs text-slate-500 mb-3">// recent searches</p>
      <div id="recent-list" class="flex flex-wrap gap-2"></div>
    </div>

  </div>

  <!-- Footer -->
  <p class="absolute bottom-5 mono text-xs text-slate-600 z-10">
    Powered by GitHub REST API · No key required
  </p>

  <script>
    const input = document.getElementById('search-input');
    const errorMsg = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');
    const loading = document.getElementById('loading');
    const recentList = document.getElementById('recent-list');
    const recentSection = document.getElementById('recent-section');

    // ── Recent searches (localStorage) ──────────────────────────
    function getRecent() {
      return JSON.parse(localStorage.getItem('gh_recent') || '[]');
    }

    function saveRecent(username) {
      let recent = getRecent().filter(u => u.toLowerCase() !== username.toLowerCase());
      recent.unshift(username);
      recent = recent.slice(0, 6);
      localStorage.setItem('gh_recent', JSON.stringify(recent));
    }

    function renderRecent() {
      const recent = getRecent();
      if (recent.length === 0) {
        recentSection.classList.add('hidden');
        return;
      }
      recentSection.classList.remove('hidden');
      recentList.innerHTML = recent.map(u => `
        <button class="chip px-3 py-1.5 rounded-lg mono text-sm text-slate-300" onclick="fillAndSearch('${u}')">
          @${u}
        </button>
      `).join('');
    }

    function fillAndSearch(username) {
      input.value = username;
      handleSearch();
    }

    // ── Show / hide helpers ──────────────────────────────────────
    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    function hideError() {
      errorMsg.classList.add('hidden');
    }

    function showLoading() {
      loading.classList.remove('hidden');
      document.getElementById('search-btn').disabled = true;
    }

    function hideLoading() {
      loading.classList.add('hidden');
      document.getElementById('search-btn').disabled = false;
    }

    // ── Main search handler ──────────────────────────────────────
    async function handleSearch() {
      const username = input.value.trim();
      hideError();

      if (!username) {
        showError('Please enter a GitHub username.');
        return;
      }

      showLoading();

      try {
        const res = await fetch(`https://api.github.com/users/${username}`);

        if (res.status === 404) {
          showError(`User "${username}" not found on GitHub.`);
          hideLoading();
          return;
        }

        if (res.status === 403) {
          showError('API rate limit reached. Please wait a minute and try again.');
          hideLoading();
          return;
        }

        if (!res.ok) {
          showError('Something went wrong. Please try again.');
          hideLoading();
          return;
        }

        const user = await res.json();

        // Save to recent and go to profile page
        saveRecent(user.login);
        window.location.href = `profile.html?user=${user.login}`;

      } catch (err) {
        showError('Network error. Check your connection and try again.');
        hideLoading();
      }
    }

    // ── Enter key support ────────────────────────────────────────
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSearch();
    });

    // ── Init ─────────────────────────────────────────────────────
    renderRecent();
    input.focus();
  </script>
</body>
</html>
