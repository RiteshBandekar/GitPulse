<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Repositories — GitExplorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Syne', sans-serif; background: #0a0a0f; }
    .mono { font-family: 'Space Mono', monospace; }

    .grid-bg {
      background-image:
        linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .repo-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      transition: all 0.2s ease;
    }
    .repo-card:hover {
      background: rgba(99,102,241,0.07);
      border-color: rgba(99,102,241,0.25);
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s ease;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); }

    .filter-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .filter-btn:hover { border-color: rgba(99,102,241,0.4); color: #a5b4fc; }
    .filter-btn.active {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.5);
      color: #a5b4fc;
    }

    .sort-select {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #94a3b8;
      cursor: pointer;
    }
    .sort-select:focus { outline: none; border-color: rgba(99,102,241,0.5); }

    .search-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f1f5f9;
      transition: border 0.2s;
    }
    .search-input:focus { outline: none; border-color: rgba(99,102,241,0.5); }
    .search-input::placeholder { color: rgba(255,255,255,0.2); }

    .lang-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
    }

    .star-badge {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.2);
      color: #fbbf24;
    }

    .fork-badge {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      color: #a5b4fc;
    }

    .orb {
      border-radius: 50%;
      filter: blur(80px);
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease forwards; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }

    .lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    /* Repo card stagger */
    .repo-item { opacity: 0; animation: fadeUp 0.35s ease forwards; }
  </style>
</head>
<body class="grid-bg min-h-screen px-4 py-10 relative">

  <div class="orb w-96 h-96 bg-indigo-600 opacity-10 top-0 -left-32"></div>
  <div class="orb w-80 h-80 bg-violet-600 opacity-10 bottom-0 -right-24"></div>

  <!-- Loading -->
  <div id="loading-state" class="flex flex-col items-center justify-center min-h-screen">
    <svg class="spinner w-8 h-8 text-indigo-400 mb-4" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
    </svg>
    <p class="mono text-slate-500 text-sm">// loading repositories...</p>
  </div>

  <!-- Main -->
  <div id="main-content" class="hidden max-w-3xl mx-auto relative z-10">

    <!-- Back + title -->
    <div class="fade-up flex items-center justify-between mb-6 flex-wrap gap-3">
      <a id="back-btn" href="#" class="btn-ghost inline-flex items-center gap-2 text-slate-400 mono text-sm px-4 py-2 rounded-lg">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        back to profile
      </a>
      <div class="text-right">
        <h1 id="page-title" class="text-lg font-bold text-white"></h1>
        <p id="repo-count-label" class="mono text-xs text-slate-500"></p>
      </div>
    </div>

    <!-- Controls -->
    <div class="card rounded-2xl p-4 mb-5 fade-up">

      <!-- Search repos -->
      <div class="relative mb-4">
        <svg class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
        </svg>
        <input id="repo-search" type="text" placeholder="search repositories..." class="search-input mono w-full rounded-xl py-2.5 pl-9 pr-4 text-sm" oninput="applyFilters()"/>
      </div>

      <!-- Sort -->
      <div class="flex flex-wrap items-center gap-3 mb-4">
        <span class="mono text-xs text-slate-500">sort by</span>
        <select id="sort-select" class="sort-select mono text-sm rounded-lg px-3 py-1.5" onchange="applyFilters()">
          <option value="updated">recently updated</option>
          <option value="stars">most stars</option>
          <option value="forks">most forks</option>
          <option value="name">name (a–z)</option>
        </select>
      </div>

      <!-- Language filters -->
      <div>
        <p class="mono text-xs text-slate-500 mb-2">filter by language</p>
        <div id="lang-filters" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <!-- Results count -->
    <p id="results-label" class="mono text-xs text-slate-600 mb-3 fade-up"></p>

    <!-- Repo list -->
    <div id="repo-list" class="flex flex-col gap-3"></div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-16">
      <p class="mono text-slate-600 text-sm">// no repositories match your filters</p>
      <button onclick="resetFilters()" class="mt-4 btn-ghost text-slate-400 mono text-xs px-4 py-2 rounded-lg">clear filters</button>
    </div>

  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const username = params.get('user');

    if (!username) window.location.href = 'index.html';

    const LANG_COLORS = {
      JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
      HTML: '#e34c26', CSS: '#563d7c', Java: '#b07219', 'C++': '#f34b7d',
      C: '#555555', 'C#': '#239120', Ruby: '#701516', Go: '#00ADD8',
      Rust: '#dea584', PHP: '#4F5D95', Swift: '#fa7343', Kotlin: '#A97BFF',
      Dart: '#00B4AB', Shell: '#89e051', Vue: '#41b883', Scala: '#c22d40',
      R: '#198CE7', Jupyter: '#DA5B0B', default: '#8b5cf6'
    };

    function getLangColor(lang) { return LANG_COLORS[lang] || LANG_COLORS.default; }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr);
      const days = Math.floor(diff / 86400000);
      if (days === 0) return 'today';
      if (days === 1) return 'yesterday';
      if (days < 30) return `${days}d ago`;
      if (days < 365) return `${Math.floor(days / 30)}mo ago`;
      return `${Math.floor(days / 365)}y ago`;
    }

    let allRepos = [];
    let activeLanguage = 'all';

    async function loadRepos() {
      // Try sessionStorage first (set by profile.html)
      const cached = sessionStorage.getItem('gh_repos');
      const cachedUser = sessionStorage.getItem('gh_user');

      if (cached) {
        allRepos = JSON.parse(cached);
        const user = cachedUser ? JSON.parse(cachedUser) : null;
        init(user);
        return;
      }

      // Fallback: fetch directly
      try {
        const [userRes, reposRes] = await Promise.all([
          fetch(`https://api.github.com/users/${username}`),
          fetch(`https://api.github.com/users/${username}/repos?per_page=100&sort=updated`)
        ]);

        if (!userRes.ok || !reposRes.ok) {
          window.location.href = `index.html`;
          return;
        }

        const user  = await userRes.json();
        allRepos    = await reposRes.json();
        init(user);
      } catch (err) {
        window.location.href = 'index.html';
      }
    }

    function init(user) {
      document.getElementById('back-btn').href = `profile.html?user=${username}`;
      document.getElementById('page-title').textContent = user ? `@${user.login}` : `@${username}`;
      document.getElementById('repo-count-label').textContent = `${allRepos.length} public repositories`;

      buildLangFilters();
      applyFilters();

      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
    }

    function buildLangFilters() {
      const langCount = {};
      allRepos.forEach(r => { if (r.language) langCount[r.language] = (langCount[r.language] || 0) + 1; });
      const sorted = Object.entries(langCount).sort((a, b) => b[1] - a[1]);

      const container = document.getElementById('lang-filters');
      container.innerHTML = `
        <button class="filter-btn active mono text-xs px-3 py-1.5 rounded-lg" onclick="setLang('all', this)">
          All
        </button>
        ${sorted.map(([lang, count]) => `
          <button class="filter-btn mono text-xs px-3 py-1.5 rounded-lg flex items-center gap-1.5" onclick="setLang('${lang}', this)">
            <span class="lang-dot" style="background:${getLangColor(lang)}"></span>
            ${lang} <span class="text-slate-600">(${count})</span>
          </button>
        `).join('')}
      `;
    }

    function setLang(lang, btn) {
      activeLanguage = lang;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function applyFilters() {
      const query  = document.getElementById('repo-search').value.toLowerCase();
      const sortBy = document.getElementById('sort-select').value;

      let filtered = allRepos.filter(r => {
        const matchLang = activeLanguage === 'all' || r.language === activeLanguage;
        const matchSearch = !query || r.name.toLowerCase().includes(query) || (r.description || '').toLowerCase().includes(query);
        return matchLang && matchSearch;
      });

      // Sort
      if (sortBy === 'stars')   filtered.sort((a, b) => b.stargazers_count - a.stargazers_count);
      if (sortBy === 'forks')   filtered.sort((a, b) => b.forks_count - a.forks_count);
      if (sortBy === 'name')    filtered.sort((a, b) => a.name.localeCompare(b.name));
      if (sortBy === 'updated') filtered.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

      renderRepos(filtered);
    }

    function renderRepos(repos) {
      const list       = document.getElementById('repo-list');
      const empty      = document.getElementById('empty-state');
      const resultsLbl = document.getElementById('results-label');

      if (repos.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        resultsLbl.textContent = '';
        return;
      }

      empty.classList.add('hidden');
      resultsLbl.textContent = `// showing ${repos.length} ${repos.length === 1 ? 'repo' : 'repos'}`;

      list.innerHTML = repos.map((repo, i) => `
        <div class="repo-item repo-card rounded-xl p-5" style="animation-delay: ${i * 40}ms">
          <div class="flex items-start justify-between gap-3 mb-2">
            <div class="flex-1 min-w-0">
              <a href="${repo.html_url}" target="_blank"
                 class="mono text-sm font-bold text-indigo-400 hover:text-indigo-300 transition-colors truncate block">
                ${repo.name}
              </a>
              ${repo.fork ? '<span class="mono text-xs text-slate-600">forked</span>' : ''}
            </div>
            <a href="${repo.html_url}" target="_blank"
               class="shrink-0 btn-ghost text-slate-400 hover:text-white rounded-lg p-1.5 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
            </a>
          </div>

          ${repo.description
            ? `<p class="text-slate-400 text-sm leading-relaxed mb-3">${repo.description}</p>`
            : `<p class="text-slate-600 text-sm mb-3 italic">No description</p>`
          }

          <!-- Topics -->
          ${repo.topics && repo.topics.length > 0
            ? `<div class="flex flex-wrap gap-1.5 mb-3">
                ${repo.topics.slice(0, 5).map(t =>
                  `<span class="mono text-xs px-2 py-0.5 rounded-full" style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#a5b4fc">${t}</span>`
                ).join('')}
               </div>`
            : ''
          }

          <!-- Footer row -->
          <div class="flex flex-wrap items-center gap-3 mt-1">
            ${repo.language
              ? `<span class="flex items-center gap-1.5 mono text-xs text-slate-400">
                   <span class="lang-dot" style="background:${getLangColor(repo.language)}"></span>
                   ${repo.language}
                 </span>`
              : ''
            }
            ${repo.stargazers_count > 0
              ? `<span class="star-badge mono text-xs px-2 py-0.5 rounded-full flex items-center gap-1">
                   <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                   ${repo.stargazers_count}
                 </span>`
              : ''
            }
            ${repo.forks_count > 0
              ? `<span class="fork-badge mono text-xs px-2 py-0.5 rounded-full flex items-center gap-1">
                   <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h.01M8 12h.01M16 7h.01M8 7a2 2 0 100-4 2 2 0 000 4zm0 5a2 2 0 100-4 2 2 0 000 4zm8-5a2 2 0 100-4 2 2 0 000 4zm0 0v6m-8-1v1a2 2 0 004 0v-1m-4 0h4"/></svg>
                   ${repo.forks_count}
                 </span>`
              : ''
            }
            <span class="mono text-xs text-slate-600 ml-auto">updated ${timeAgo(repo.updated_at)}</span>
          </div>
        </div>
      `).join('');
    }

    function resetFilters() {
      document.getElementById('repo-search').value = '';
      activeLanguage = 'all';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.filter-btn')?.classList.add('active');
      applyFilters();
    }

    loadRepos();
  </script>
</body>
</html>
