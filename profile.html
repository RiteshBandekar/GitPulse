<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — GitExplorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Syne', sans-serif; background: #0a0a0f; }
    .mono { font-family: 'Space Mono', monospace; }

    .grid-bg {
      background-image:
        linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .stat-card {
      background: rgba(99,102,241,0.07);
      border: 1px solid rgba(99,102,241,0.15);
      transition: all 0.2s ease;
    }
    .stat-card:hover { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      transition: all 0.3s ease;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }

    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s ease;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }

    .orb {
      border-radius: 50%;
      filter: blur(80px);
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .fade-up-2 { animation: fadeUp 0.5s ease 0.15s forwards; opacity: 0; }
    .fade-up-3 { animation: fadeUp 0.5s ease 0.3s forwards; opacity: 0; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }

    .avatar-ring {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
      padding: 3px;
      border-radius: 50%;
    }

    .lang-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="grid-bg min-h-screen px-4 py-10 relative">

  <div class="orb w-96 h-96 bg-indigo-600 opacity-10 top-0 -left-32"></div>
  <div class="orb w-80 h-80 bg-violet-600 opacity-10 bottom-0 -right-24"></div>

  <!-- Loading state -->
  <div id="loading-state" class="flex flex-col items-center justify-center min-h-screen">
    <svg class="spinner w-8 h-8 text-indigo-400 mb-4" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
    </svg>
    <p class="mono text-slate-500 text-sm">// fetching profile...</p>
  </div>

  <!-- Error state -->
  <div id="error-state" class="hidden flex flex-col items-center justify-center min-h-screen gap-4">
    <p class="mono text-red-400 text-sm" id="error-text">Something went wrong.</p>
    <a href="index.html" class="btn-ghost text-slate-300 mono text-sm px-4 py-2 rounded-lg">← go back</a>
  </div>

  <!-- Main content -->
  <div id="main-content" class="hidden max-w-3xl mx-auto relative z-10">

    <!-- Back button -->
    <div class="fade-up mb-6">
      <a href="index.html" class="btn-ghost inline-flex items-center gap-2 text-slate-400 mono text-sm px-4 py-2 rounded-lg">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        back to search
      </a>
    </div>

    <!-- Profile card -->
    <div class="card rounded-2xl p-6 mb-5 fade-up">
      <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6">

        <!-- Avatar -->
        <div class="avatar-ring shrink-0">
          <img id="avatar" src="" alt="avatar" class="w-24 h-24 rounded-full block"/>
        </div>

        <!-- Info -->
        <div class="flex-1 text-center sm:text-left">
          <h1 id="name" class="text-2xl font-extrabold text-white mb-1"></h1>
          <p id="login" class="mono text-indigo-400 text-sm mb-3"></p>
          <p id="bio" class="text-slate-400 text-sm leading-relaxed mb-4 hidden"></p>

          <!-- Meta row -->
          <div class="flex flex-wrap justify-center sm:justify-start gap-4 text-slate-500 mono text-xs">
            <span id="location" class="hidden items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <span id="location-text"></span>
            </span>
            <span id="company" class="hidden items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
              <span id="company-text"></span>
            </span>
            <span id="blog" class="hidden items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
              <a id="blog-link" href="#" target="_blank" class="text-indigo-400 hover:text-indigo-300"></a>
            </span>
            <span id="joined" class="items-center gap-1 flex">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span id="joined-text"></span>
            </span>
          </div>
        </div>

        <!-- GitHub link -->
        <a id="gh-link" href="#" target="_blank" class="btn-primary shrink-0 text-white mono text-xs font-bold px-4 py-2 rounded-lg flex items-center gap-2">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          View on GitHub
        </a>
      </div>
    </div>

    <!-- Stats row -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5 fade-up-2">
      <div class="stat-card rounded-xl p-4 text-center">
        <p class="text-2xl font-extrabold text-white" id="stat-repos">—</p>
        <p class="mono text-xs text-slate-500 mt-1">repos</p>
      </div>
      <div class="stat-card rounded-xl p-4 text-center">
        <p class="text-2xl font-extrabold text-white" id="stat-followers">—</p>
        <p class="mono text-xs text-slate-500 mt-1">followers</p>
      </div>
      <div class="stat-card rounded-xl p-4 text-center">
        <p class="text-2xl font-extrabold text-white" id="stat-following">—</p>
        <p class="mono text-xs text-slate-500 mt-1">following</p>
      </div>
      <div class="stat-card rounded-xl p-4 text-center">
        <p class="text-2xl font-extrabold text-white" id="stat-gists">—</p>
        <p class="mono text-xs text-slate-500 mt-1">gists</p>
      </div>
    </div>

    <!-- Languages chart + legend -->
    <div class="card rounded-2xl p-6 mb-5 fade-up-3">
      <h2 class="mono text-sm text-slate-400 mb-5">// top languages</h2>
      <div id="no-langs" class="hidden text-slate-600 mono text-sm text-center py-6">No public repo language data found.</div>
      <div id="chart-area" class="flex flex-col sm:flex-row items-center gap-8">
        <div class="w-52 h-52 shrink-0">
          <canvas id="lang-chart"></canvas>
        </div>
        <div id="lang-legend" class="flex flex-col gap-2 w-full"></div>
      </div>
    </div>

    <!-- View repos button -->
    <div class="fade-up-3 text-center">
      <button id="repos-btn" onclick="goToRepos()" class="btn-primary text-white font-bold mono text-sm px-8 py-3 rounded-xl inline-flex items-center gap-2">
        View all repositories
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('user');

    if (!username) {
      window.location.href = 'index.html';
    }

    const LANG_COLORS = {
      JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
      HTML: '#e34c26', CSS: '#563d7c', Java: '#b07219', 'C++': '#f34b7d',
      C: '#555555', 'C#': '#239120', Ruby: '#701516', Go: '#00ADD8',
      Rust: '#dea584', PHP: '#4F5D95', Swift: '#fa7343', Kotlin: '#A97BFF',
      Dart: '#00B4AB', Shell: '#89e051', Vue: '#41b883', Scala: '#c22d40',
      R: '#198CE7', Jupyter: '#DA5B0B', default: '#8b5cf6'
    };

    function getLangColor(lang) {
      return LANG_COLORS[lang] || LANG_COLORS.default;
    }

    function formatNumber(n) {
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return n;
    }

    function showError(msg) {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-state').classList.remove('hidden');
      document.getElementById('error-state').classList.add('flex');
    }

    async function loadProfile() {
      try {
        // Fetch user + repos in parallel
        const [userRes, reposRes] = await Promise.all([
          fetch(`https://api.github.com/users/${username}`),
          fetch(`https://api.github.com/users/${username}/repos?per_page=100&sort=updated`)
        ]);

        if (userRes.status === 404) { showError(`User "${username}" not found.`); return; }
        if (!userRes.ok) { showError('Failed to load profile. Try again.'); return; }

        const user = await userRes.json();
        const repos = reposRes.ok ? await reposRes.json() : [];

        // Store repos in sessionStorage for repos.html
        sessionStorage.setItem('gh_repos', JSON.stringify(repos));
        sessionStorage.setItem('gh_user', JSON.stringify(user));

        renderProfile(user);
        renderLanguages(repos);

        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');

      } catch (err) {
        showError('Network error. Check your connection.');
      }
    }

    function renderProfile(user) {
      document.title = `${user.name || user.login} — GitExplorer`;
      document.getElementById('avatar').src = user.avatar_url;
      document.getElementById('name').textContent = user.name || user.login;
      document.getElementById('login').textContent = `@${user.login}`;
      document.getElementById('gh-link').href = user.html_url;
      document.getElementById('joined-text').textContent = 'joined ' + new Date(user.created_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

      if (user.bio) {
        const bio = document.getElementById('bio');
        bio.textContent = user.bio;
        bio.classList.remove('hidden');
      }
      if (user.location) {
        document.getElementById('location-text').textContent = user.location;
        document.getElementById('location').classList.remove('hidden');
        document.getElementById('location').classList.add('flex');
      }
      if (user.company) {
        document.getElementById('company-text').textContent = user.company;
        document.getElementById('company').classList.remove('hidden');
        document.getElementById('company').classList.add('flex');
      }
      if (user.blog) {
        const blogLink = document.getElementById('blog-link');
        blogLink.textContent = user.blog.replace(/^https?:\/\//, '');
        blogLink.href = user.blog.startsWith('http') ? user.blog : 'https://' + user.blog;
        document.getElementById('blog').classList.remove('hidden');
        document.getElementById('blog').classList.add('flex');
      }

      document.getElementById('stat-repos').textContent = formatNumber(user.public_repos);
      document.getElementById('stat-followers').textContent = formatNumber(user.followers);
      document.getElementById('stat-following').textContent = formatNumber(user.following);
      document.getElementById('stat-gists').textContent = formatNumber(user.public_gists);
    }

    function renderLanguages(repos) {
      const langCount = {};
      repos.forEach(r => {
        if (r.language) langCount[r.language] = (langCount[r.language] || 0) + 1;
      });

      const sorted = Object.entries(langCount).sort((a, b) => b[1] - a[1]).slice(0, 7);

      if (sorted.length === 0) {
        document.getElementById('chart-area').classList.add('hidden');
        document.getElementById('no-langs').classList.remove('hidden');
        return;
      }

      const labels = sorted.map(([l]) => l);
      const data   = sorted.map(([, c]) => c);
      const colors = labels.map(getLangColor);
      const total  = data.reduce((a, b) => a + b, 0);

      // Chart.js doughnut
      const ctx = document.getElementById('lang-chart').getContext('2d');
      new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: '#0a0a0f', borderWidth: 3, hoverBorderWidth: 4 }] },
        options: {
          cutout: '72%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.label}: ${ctx.raw} repos (${Math.round(ctx.raw / total * 100)}%)`
              },
              backgroundColor: '#1e1e2e',
              titleColor: '#a5b4fc',
              bodyColor: '#cbd5e1',
              borderColor: 'rgba(99,102,241,0.3)',
              borderWidth: 1,
              padding: 10,
            }
          }
        }
      });

      // Legend
      const legend = document.getElementById('lang-legend');
      legend.innerHTML = sorted.map(([lang, count]) => `
        <div class="flex items-center justify-between gap-3 py-1.5 border-b border-white/5 last:border-0">
          <div class="flex items-center gap-2.5">
            <span class="lang-dot" style="background:${getLangColor(lang)}"></span>
            <span class="mono text-sm text-slate-300">${lang}</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="mono text-xs text-slate-500">${count} repos</span>
            <span class="mono text-xs font-bold" style="color:${getLangColor(lang)}">${Math.round(count / total * 100)}%</span>
          </div>
        </div>
      `).join('');
    }

    function goToRepos() {
      window.location.href = `repos.html?user=${username}`;
    }

    loadProfile();
  </script>
</body>
</html>
